<!doctype html>
<html>
<head>
  <title>Project Title</title>
  <meta charset="utf-8" name="viewport" content="width=device-width, initial-scale=1">

  <link href="https://use.fontawesome.com/releases/v5.2.0/css/all.css" media="screen" rel="stylesheet" type="text/css" />
  <link href="css/frame.css" media="screen" rel="stylesheet" type="text/css" />
  <link href="css/controls.css" media="screen" rel="stylesheet" type="text/css" />
  <link href="css/custom.css" media="screen" rel="stylesheet" type="text/css" />
  <link href="https://fonts.googleapis.com/css?family=Open+Sans:400,700" rel="stylesheet" type="text/css">
  <link href="https://fonts.googleapis.com/css?family=Open+Sans+Condensed:300,700" rel="stylesheet" type="text/css">
  <link href="https://fonts.googleapis.com/css?family=Source+Sans+Pro:400,700" rel="stylesheet">

  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
  <script src="js/menu.js"></script>

  <!-- Leaflet (for OpenStreetMap) -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />
  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>

  <style>
    .menu-embedding {
      color: rgb(255, 255, 255) !important;
      opacity: 1 !important;
      font-weight: 700 !important;
    }

    /* Make the page behave like your embedding layout */
    body.force-no-scroll {
      overflow: hidden;
    }

    .map-container {
      width: 100%;
      height: 100vh; /* full viewport height */
    }

    #chinaMap {
      width: 100%;
      height: 100%;
    }
  </style>
</head>

<body class="force-no-scroll">
  <div class="menu-container"></div>

  <!-- Replace iframe with ONE map -->
  <div class="map-container">
    <div id="chinaMap"></div>
  </div>

  <script>
    // 1) Initialize ONE map centered on China
    // China approx center: [35, 103]
    const map = L.map("chinaMap", {
      center: [35, 103],
      zoom: 4,
      minZoom: 3,
      maxZoom: 18,
      zoomControl: true
    });

    // 2) Add OpenStreetMap tiles
    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);

    // 3) (Optional) Keep view constrained around China-ish bounds
    // This prevents accidental panning to the other side of the world too easily.
    const chinaBounds = L.latLngBounds(
      L.latLng(15, 70),   // SW corner (rough)
      L.latLng(55, 140)   // NE corner (rough)
    );
    map.setMaxBounds(chinaBounds);
    map.on("drag", function () {
      map.panInsideBounds(chinaBounds, { animate: false });
    });

    // 4) (Optional) A sample marker
    // L.marker([39.9042, 116.4074]).addTo(map).bindPopup("Beijing");
  </script>
</body>
</html>
